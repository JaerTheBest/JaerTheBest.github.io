<p>This page was viewed</p>
<h1 id="count">0</h1>
<p>times</p>


<script>
	const countEl = document.getElementById('count');

updateVisitCount();

function updateVisitCount() {
	fetch('https://api.countapi.xyz/hit/jaer/visits')
	.then(res => res.json())
	.then(res => {
		countEl.innerHTML = res.value;
	})
}

</script>
